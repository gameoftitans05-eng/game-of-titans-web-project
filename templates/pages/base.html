<script>

    function activateTab(tabName) {
        const tabs = document.querySelectorAll(".tab")
        const contents = document.querySelectorAll(".tab-content")

        tabs.forEach(btn => {
            btn.classList.toggle("active", btn.dataset.tab === tabName)
        })

        contents.forEach(content => {
            content.classList.toggle("active", content.id === tabName + "-tab")
        })
    }

    /* ================= DEFAULT LOAD ================= */
    function handleHash() {
        const hash = window.location.hash.replace("#", "")

        if (hash === "athlete") {
            activateTab("athlete")
        } else {
            // default = gym
            activateTab("gym")
        }
    }

    /* ================= CLICK HANDLER ================= */
    document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
            const tab = btn.dataset.tab

            // switch tab
            activateTab(tab)

            // update URL without reload
            history.replaceState(null, null, "#" + tab)
        })
    })

    /* ================= RUN ================= */
    window.addEventListener("DOMContentLoaded", handleHash)
    window.addEventListener("hashchange", handleHash)

</script>

<script>

    const MPCG_STATES = ["Madhya Pradesh", "Chhattisgarh"];

const STATE_CITY_MAP = {
    "Madhya Pradesh": ["Bhopal", "Indore", "Jabalpur", "Gwalior", "Ujjain", "Other MP City"],
    "Chhattisgarh": ["Raipur", "Bilaspur", "Durg", "Bhilai", "Korba", "Other CG City"],
    "Maharashtra": ["Mumbai", "Pune", "Nagpur"],
    "Delhi": ["New Delhi"],
    "Karnataka": ["Bengaluru"]
};

function populateStates() {
    const stateSelect = document.getElementById('state');
    stateSelect.innerHTML = `<option value="">Select State</option>`;

    Object.keys(STATE_CITY_MAP).forEach(state => {
        stateSelect.innerHTML += `<option value="${state}">${state}</option>`;
    });
}

document.getElementById('state')?.addEventListener('change', function () {
    const citySelect = document.getElementById('city');
    const employeeSelect = document.getElementById('got_employee');

    const cities = STATE_CITY_MAP[this.value] || [];
    citySelect.innerHTML = `<option value="">Select City</option>`;
    cities.forEach(c => {
        citySelect.innerHTML += `<option value="${c}">${c}</option>`;
    });

    // MPCG LOGIC
    if (MPCG_STATES.includes(this.value)) {
        employeeSelect.innerHTML = `
            <option value="mpcg_partner">
                Regional Partner (MP & Chhattisgarh)
            </option>
        `;
        employeeSelect.disabled = true;
    } else {
        employeeSelect.disabled = false;
        loadEmployees();
    }
});

    async function loadEmployees() {
    const select = document.getElementById('got_employee');

    try {
        const res = await fetch('/api/v1/employees/');
        const data = await res.json();

        select.innerHTML = `<option value="">Select GOT Team Member</option>`;

        data.forEach(emp => {
            select.innerHTML += `
                <option value="${emp.id}">
                    ${emp.name} — ${emp.code}
                </option>
            `;
        });

    } catch (err) {
        console.error("Employee load error", err);
    }
}

    document.addEventListener('DOMContentLoaded', () => {
    populateStaticDropdowns();
    populateStates();
    loadEmployees();
});

document.getElementById('gym-form')?.addEventListener('submit', async function (e) {
    e.preventDefault();

    const form = e.target;
    const btn = form.querySelector('button[type="submit"]');

    // Disable button
    btn.disabled = true;
    const originalText = btn.innerHTML;
    btn.innerHTML = "Registering...";

    // Collect form data
    const formData = new FormData(form);

    // Basic frontend validation
    const requiredFields = [
        "name", "contact_person", "role", "email", "phone",
        "state", "city", "address",
        "active_members", "expected_athletes",
        "event_leg"
    ];

    for (let field of requiredFields) {
        if (!formData.get(field)) {
            showError(`${field.replace('_', ' ')} is required`);
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
        }
    }

    try {
        const res = await fetch('/api/v1/register-gym/', {
            method: 'POST',
            body: new URLSearchParams(formData),
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': getCookie('csrftoken')
            }
        });

        const result = await res.json();

        if (!result.success) {
            showError(result.error || "Registration failed");
            return;
        }

        // ─────────────────────────────
        // MPCG CASE
        // ─────────────────────────────

<script>
    const form = document.getElementById('athlete-form');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // ===== BUTTON LOADING =====
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            // ===== COLLECT DATA =====
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // ===== CHECKBOX VALIDATION =====
            if (!document.getElementById('terms').checked) {
                throw new Error("Please accept Terms & Conditions");
            }

            if (!document.getElementById('confirm').checked) {
                throw new Error("Please confirm your details");
            }

            // ===== TITAN ID VALIDATION =====
            if (data.registration_type === "Gym Participant") {
                if (!data.titan_id) {
                    throw new Error("Titan Gym ID is required");
                }

                if (!/^TITAN-\w{4,}$/.test(data.titan_id.toUpperCase())) {
                    throw new Error("Invalid Titan Gym ID format");
                }

                data.titan_id = data.titan_id.toUpperCase();
            }

            // ===== API CALL =====
            const response = await fetch('/api/v1/initiate-participation/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (!result.success) {
                throw new Error(result.error || "Something went wrong");
            }

            // ===== CASHFREE INIT =====
            const cashfree = Cashfree({
                mode: "production" // change to "production" in live
            });

            // ===== OPEN CHECKOUT =====
            await cashfree.checkout({
                paymentSessionId: result.payment_session_id,
                redirectTarget: "_self" // IMPORTANT → goes to your payment_success view
            });

            // No code here after redirect

        } catch (error) {
            console.error(error);

            alert(error.message);

            btn.disabled = false;
            btn.innerText = "PAY & REGISTER — ₹888";
        }
    });

    function getCSRFToken() {
        let cookieValue = null;
        const cookies = document.cookie.split(';');

        cookies.forEach(cookie => {
            const [key, value] = cookie.trim().split('=');
            if (key === 'csrftoken') {
                cookieValue = value;
            }
        });

        return cookieValue;
    }
</script>

    function animateCounter(id, target, duration = 2000) {
        const element = document.getElementById(id);

        const start = 0;
        const increment = target / (duration / 16);
        let current = start;

        const timer = setInterval(() => {
            current += increment;

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
