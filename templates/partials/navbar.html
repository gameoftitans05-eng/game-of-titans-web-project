<header id="navbar"

        <!-- LEFT: Logo -->
        <div class="flex items-center">
            <a href="/" class="flex items-center h-full">
                <img src="https://felikstar.com/titans-media/images/got_logo_rect_1.png"
                     alt="Game of Titans Logo"
                     style="height: 48px;"
                     class="h-12 w-auto object-contain block"/>
            </a>
        </div>

        <!-- CENTER: Navigation -->
        <div class="hidden md:flex items-center gap-8 absolute left-1/2 -translate-x-1/2">
            <a href="{% url 'home' %}#captains" class="nav-link">Captains</a>
            <a href="{% url 'home' %}#seasons" class="nav-link">Seasons</a>
            <a href="{% url 'home' %}#prize" class="nav-link">Prize</a>
            <a href="{% url 'register' %}" class="nav-link">Register</a>
            <a href="{% url 'about' %}" class="nav-link">About</a>
            <a href="{% url 'sponsors' %}" class="nav-link">Sponsors</a>
            <a href="#contact" class="nav-link">Contact</a>

        <!-- RIGHT: CTA -->
<!--        <div class="hidden md:flex ml-auto">-->
<!--            <a href="{% url 'register' %}"-->
<!--                    class="btn-primary">-->
<!--                Register Now-->
<!--            </a>-->
<!--        </div>-->

        <!-- MOBILE MENU BUTTON -->
        <button id="menu-btn" class="md:hidden text-[#454240]">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>

    </nav>

    <!-- MOBILE OVERLAY -->
    <div id="mobile-menu"
         class="fixed inset-0 bg-[#F7F7F7] hidden flex-col items-center justify-center text-center z-[100]"
         style="background-color: #F7F7F7;">

        <!-- Close Button -->
        <button id="close-menu" class="absolute top-6 right-6 z-[110]" style="top: 2rem;right:2rem;">
            <i data-lucide="x" class="w-7 h-7 text-[#454240]"></i>
        </button>

        <!-- Links -->
        <div class="flex flex-col gap-8">
            <a href="{% url 'home' %}#captains" class="mobile-link">Captains</a>
            <a href="{% url 'home' %}#seasons" class="mobile-link">Seasons</a>
            <a href="{% url 'home' %}#prize" class="mobile-link">Prize</a>
            <a href="{% url 'register' %}" class="mobile-link">Register</a>
            <a href="{% url 'about' %}" class="mobile-link">About</a>
            <a href="{% url 'sponsors' %}" class="mobile-link">Sponsors</a>
            <a href="#contact" class="mobile-link">Contact</a>
        </div>

        <!-- Bottom CTA -->
        <div class="absolute bottom-10 w-full flex justify-center">
            <a href="{% url 'register' %}" class="btn-primary px-10 py-3">
                Register Now
            </a>
        </div>

    </div>
